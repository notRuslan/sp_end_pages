
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SP Bonus Popup Compact</title>
    <style>
        :root{
            --bg:#e9eded;
            --card:#f7f8f6;
            --green:#116b52;
            --green-dark:#0d5a45;
            --cta-top:#8fe35c;
            --cta-mid:#3ab153;
            --cta-bot:#1e8b4b;
            --text:#1f2328;
            --muted:#5c636b;
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            font-family: Inter, Arial, Helvetica, sans-serif;
            background: var(--bg);
            min-height:100vh;
            display:grid;
            place-items:center;
            color:var(--text);
        }
        .wrap{
            width:min(980px, 94vw);
            padding:28px 0;
            position:relative;
        }
        .card{
            position:relative;
            background:
                    radial-gradient(circle at 50% 0%, rgba(255,255,255,.72), rgba(255,255,255,0) 46%),
                    linear-gradient(180deg, #fbfbfa 0%, #f3f5f3 100%);
            border:8px solid rgba(255,255,255,.88);
            border-radius:34px;
            box-shadow:
                    0 18px 38px rgba(18,57,44,.14),
                    inset 0 1px 0 rgba(255,255,255,.95);
            overflow:hidden;
            padding:34px 42px 34px;
        }
        .sparkles{
            position:absolute;
            inset:-6px;
            pointer-events:none;
        }
        .sparkles span{
            position:absolute;
            color:#fff6b8;
            text-shadow:0 0 10px rgba(255,236,140,.75), 0 0 22px rgba(255,236,140,.45);
            font-size:20px;
            opacity:.9;
        }
        .close{
            position:absolute;
            right:22px;
            top:18px;
            width:54px;
            height:54px;
            border-radius:50%;
            border:2px solid rgba(0,0,0,.12);
            background:#f3f3f3;
            color:#8b8f94;
            font-size:34px;
            line-height:48px;
            text-align:center;
            user-select:none;
        }
        h1{
            margin:44px 0 18px;
            text-align:center;
            font-size:clamp(30px,4.7vw,56px);
            line-height:1.05;
            color:var(--green-dark);
            letter-spacing:.3px;
        }
        h1 .money{
            color:var(--green);
            font-weight:950;
        }
        .sub{
            text-align:center;
            font-size:clamp(20px,2.45vw,36px);
            line-height:1.28;
            margin:0 auto 70px;
            max-width:820px;
        }
        .sub strong{color:var(--green-dark); font-weight:900}
        .checks{
            margin:8px auto 28px;
            max-width:820px;
            display:grid;
            gap:14px;
        }
        .check{
            display:flex;
            align-items:center;
            gap:14px;
            font-size:clamp(20px,2.2vw,32px);
            line-height:1.22;
            padding:8px 0;
            border-top:1px solid rgba(0,0,0,.06);
        }
        .check:first-child{border-top:none}
        .icon{
            flex:0 0 auto;
            width:42px;
            height:42px;
            border-radius:50%;
            background:linear-gradient(180deg,#6fcb50,#2d9444);
            color:white;
            display:grid;
            place-items:center;
            font-weight:900;
            font-size:28px;
            box-shadow:inset 0 2px 0 rgba(255,255,255,.3), 0 2px 6px rgba(0,0,0,.18);
        }
        .check strong{color:var(--green-dark)}
        .cta{
            display:block;
            width:min(560px,100%);
            margin:4px auto 14px;
            text-align:center;
            text-decoration:none;
            color:white;
            font-size:clamp(28px,3.8vw,50px);
            font-weight:900;
            padding:20px 28px;
            border-radius:22px;
            background:
                    linear-gradient(180deg, var(--cta-top) 0%, var(--cta-mid) 38%, var(--cta-bot) 100%);
            box-shadow:
                    inset 0 2px 0 rgba(255,255,255,.35),
                    inset 0 -3px 0 rgba(0,0,0,.12),
                    0 8px 18px rgba(14,93,52,.28);
            border:4px solid #1d7c44;
        }
        .foot{
            text-align:center;
            color:var(--muted);
            font-size:clamp(17px,1.95vw,28px);
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="sparkles" aria-hidden="true">
        <span style="left:4%;top:4%">✦</span>
        <span style="left:10%;top:1%">✦</span>
        <span style="right:8%;top:2%">✦</span>
        <span style="right:2%;top:5%">✦</span>
    </div>

    <div class="card">
        <div class="close">×</div>

        <h1>EARN <span class="money">$3</span> GUARANTEED BONUS!</h1>

        <p class="sub">On top of the rewards you’ll earn for completing <strong>ANY</strong> survey</p>

        <div class="checks">
            <div class="check">
                <div class="icon">✓</div>
                <div><strong>$3 Guaranteed Bonus</strong> for completing <strong>ANY</strong> survey</div>
            </div>
            <div class="check">
                <div class="icon">✓</div>
                <div><strong>$1 Guaranteed Bonus</strong> even if you don’t qualify</div>
            </div>
        </div>

        <a class="cta" href="#">Start &amp; Earn</a>
        <div class="foot">Takes just a few minutes.</div>
    </div>
</div>
</body>
</html>
