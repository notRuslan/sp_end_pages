<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bonus Popup — Two Variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --green: #09AB87;
    --green-dark: #067C62;
    --green-ring: #7BD4A0;
    --green-inner: #1AAE88;
    --pink: #C4267A;
    --pink-hover: #A91E68;
    --ink: #333;
    --ink-light: #555;
    --gold: #F5A623;
    --gold-dark: #D4910F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Jost", Arial, sans-serif;
    background: #E8ECEA;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 60px;
    padding: 40px 20px;
  }

  .label {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    font-weight: 600;
    margin-bottom: -40px;
  }

  /* ======================================
     OVERLAY (shared dim background)
     ====================================== */
  .overlay {
    position: relative;
    width: 520px;
    max-width: 100%;
    border-radius: 6px;
    background: rgba(0,0,0,0.35);
    padding: 40px;
    display: flex;
    justify-content: center;
  }

  /* ======================================
     MODAL BASE — matches existing popups
     ====================================== */
  .modal {
    background: #fff;
    border-radius: 8px;
    width: 440px;
    max-width: 100%;
    text-align: center;
    position: relative;
    padding: 40px 32px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  }

  /* close X */
  .modal .close {
    position: absolute;
    top: 14px;
    right: 16px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #aaa;
    font-size: 22px;
    line-height: 1;
    transition: color 150ms;
    background: none;
    border: none;
    font-family: "Jost";
  }
  .modal .close:hover { color: #555; }

  /* title — uppercase, gray, letter-spaced (matches ref) */
  .modal h2 {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #666;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .modal h2 .amount {
    color: var(--green-dark);
    font-weight: 700;
  }

  /* subtitle */
  .modal .sub {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 24px;
  }
  .modal .sub strong { color: var(--green-dark); font-weight: 700; }

  /* ======================================
     ICON RING — double green circle
     ====================================== */
  .ring {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: var(--green-ring);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
  }
  .ring .inner {
    width: 136px;
    height: 136px;
    border-radius: 50%;
    background: var(--green-inner);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ring svg {
    width: 72px;
    height: 72px;
    color: #fff;
  }

  /* bonus callout beneath icon */
  .bonus-line {
    font-size: 14px;
    color: var(--ink-light);
    margin-bottom: 26px;
  }
  .bonus-line .dollar {
    font-weight: 700;
    color: var(--green-dark);
  }

  /* CTA — pink, rounded, matches ref */
  .cta {
    display: inline-block;
    font-family: "Jost", Arial, sans-serif;
    font-size: 17px;
    font-weight: 500;
    color: #fff;
    background: var(--pink);
    border: none;
    border-radius: 30px;
    padding: 14px 48px;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.4px;
    transition: background 150ms, transform 150ms;
  }
  .cta:hover {
    background: var(--pink-hover);
    transform: translateY(-1px);
  }

  /* ======================================
     VARIANT 2 — WOW EFFECTS
     ====================================== */

  /* pulsing glow behind ring */
  .wow .ring {
    position: relative;
    animation: ring-pop 600ms cubic-bezier(.2,1.2,.3,1) both;
  }
  .wow .ring::before {
    content: "";
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(9,171,135,0.25) 0%, transparent 70%);
    animation: glow-pulse 2s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 1; }
  }
  @keyframes ring-pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* shimmer sweep on button */
  .wow .cta {
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--pink) 0%, #D63384 100%);
    box-shadow: 0 6px 24px rgba(196, 38, 122, 0.35);
  }
  .wow .cta::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { left: -100%; }
    50% { left: 100%; }
    100% { left: 100%; }
  }
  .wow .cta:hover {
    background: linear-gradient(135deg, var(--pink-hover) 0%, #B12A72 100%);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(196, 38, 122, 0.4);
  }

  /* floating sparkles / particles */
  .wow .ring-wrap { position: relative; display: inline-block; }
  .sparkle {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    opacity: 0;
    transform: rotate(45deg);
  }
  .sparkle:nth-child(1) { background: var(--gold); top: 8px; left: 20px; animation: sparkle-float 2.2s 0.2s ease-in-out infinite; }
  .sparkle:nth-child(2) { background: var(--green); top: 15px; right: 12px; animation: sparkle-float 2.6s 0.6s ease-in-out infinite; width: 7px; height: 7px; }
  .sparkle:nth-child(3) { background: var(--pink); bottom: 20px; left: 10px; animation: sparkle-float 2s 1s ease-in-out infinite; width: 8px; height: 8px; }
  .sparkle:nth-child(4) { background: var(--gold); bottom: 10px; right: 20px; animation: sparkle-float 2.4s 0.4s ease-in-out infinite; width: 6px; height: 6px; }
  .sparkle:nth-child(5) { background: var(--green-ring); top: 45%; left: -8px; animation: sparkle-float 2.8s 0.8s ease-in-out infinite; width: 9px; height: 9px; }
  .sparkle:nth-child(6) { background: var(--gold-dark); top: 40%; right: -6px; animation: sparkle-float 2.1s 1.2s ease-in-out infinite; width: 7px; height: 7px; }

  @keyframes sparkle-float {
    0%, 100% { opacity: 0; transform: rotate(45deg) translateY(0) scale(0.5); }
    20% { opacity: 1; transform: rotate(45deg) translateY(-8px) scale(1); }
    80% { opacity: 0.8; transform: rotate(45deg) translateY(-16px) scale(0.9); }
  }

  /* gold badge "$3" floating above ring */
  .wow-badge {
    position: absolute;
    top: -8px;
    right: -4px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: #fff;
    font-size: 18px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(245, 166, 35, 0.45);
    animation: badge-bounce 2s ease-in-out infinite;
    z-index: 2;
    border: 3px solid #fff;
  }
  @keyframes badge-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* confetti burst on the card (subtle) */
  .wow .modal::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle 3px, var(--gold) 100%, transparent 100%),
      radial-gradient(circle 2px, var(--green) 100%, transparent 100%),
      radial-gradient(circle 2.5px, var(--pink) 100%, transparent 100%),
      radial-gradient(circle 2px, var(--gold) 100%, transparent 100%),
      radial-gradient(circle 3px, var(--green-ring) 100%, transparent 100%),
      radial-gradient(circle 2px, var(--pink) 100%, transparent 100%);
    background-size: 5px 5px;
    background-position:
      10% 5%,
      85% 12%,
      25% 92%,
      90% 88%,
      50% 3%,
      70% 95%;
    background-repeat: no-repeat;
    opacity: 0;
    animation: confetti-show 600ms 400ms ease-out forwards;
  }
  @keyframes confetti-show {
    0% { opacity: 0; }
    100% { opacity: 0.7; }
  }

  /* responsive */
  @media (max-width: 560px) {
    .overlay { padding: 24px 12px; }
    .modal { padding: 32px 20px 28px; }
    .ring { width: 140px; height: 140px; }
    .ring .inner { width: 106px; height: 106px; }
    .ring svg { width: 56px; height: 56px; }
    .modal h2 { font-size: 16px; }
    .cta { padding: 12px 36px; font-size: 16px; }
  }
</style>
</head>
<body>

<!-- ========================================
     VARIANT 1 — CLASSIC (matches existing)
     ======================================== -->
<span class="label">Variant 1 — Classic</span>
<div class="overlay">
  <div class="modal classic">
    <button class="close" aria-label="Close">&times;</button>

    <h2>Earn <span class="amount">$3</span> bonus now!</h2>
    <p class="sub">Earn <strong>$3 EXTRA</strong> for completing ANY survey</p>

    <div class="ring">
      <div class="inner">
        <!-- dollar coin icon -->
        <svg viewBox="0 0 64 64" fill="none">
          <circle cx="32" cy="32" r="24" stroke="#fff" stroke-width="3.5" />
          <text x="32" y="38" text-anchor="middle" font-family="Jost,Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">$</text>
        </svg>
      </div>
    </div>

    <p class="bonus-line">If not qualified, you still earn <span class="dollar">$1</span></p>

    <a href="#" class="cta">Start &amp; Earn</a>
  </div>
</div>


<!-- ========================================
     VARIANT 2 — WOW EFFECTS
     ======================================== -->
<span class="label">Variant 2 — Wow</span>
<div class="overlay">
  <div class="modal wow">
    <button class="close" aria-label="Close">&times;</button>

    <h2>Earn <span class="amount">$3</span> bonus now!</h2>
    <p class="sub">Earn <strong>$3 EXTRA</strong> for completing ANY survey</p>

    <div class="ring-wrap">
      <!-- sparkle particles -->
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <!-- gold $3 badge -->
      <span class="wow-badge">$3</span>
      <div class="ring">
        <div class="inner">
          <svg viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="24" stroke="#fff" stroke-width="3.5" />
            <text x="32" y="38" text-anchor="middle" font-family="Jost,Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">$</text>
          </svg>
        </div>
      </div>
    </div>

    <p class="bonus-line">If not qualified, you still earn <span class="dollar">$1</span></p>

    <a href="#" class="cta">Start &amp; Earn</a>
  </div>
</div>

</body>
</html>
